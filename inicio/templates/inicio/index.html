        body {

        /* Colores personalizados */
        .bg-hospital-blue { background-color: #0d3b66; }
        .bg-hospital-gray { background-color: #4a4e69; }
        .text-hospital-blue { color: #0d3b66; }

            background-position: center;
            color: white;
            padding: 100px 0;
        }

        .card {
            border: none;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        footer {
            background-color: #22223b;
            color: #adb5bd;
        }
    </style>
